apply plugin: 'com.android.application'

android {
    namespace "com.g9expert.app"
    compileSdk rootProject.ext.compileSdkVersion
    
    // Step 3: Java Compatibility
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    // Step 4: Kotlin (Future Safe)
//    kotlinOptions {
//        jvmTarget = '17'
//    }
    
    // Step 2: Build Features
    buildFeatures {
        buildConfig true
    }
    flavorDimensions "app"


  defaultConfig {

    applicationId "com.g9expert.app"

    minSdkVersion rootProject.ext.minSdkVersion

    targetSdkVersion rootProject.ext.targetSdkVersion

    versionCode 1

    versionName "1.0.0"

    buildConfigField "String", "APP_TYPE", "\"web\""
     buildConfigField "String", "API_BASE_URL", "\"https://softmaxs.com/api\""

    manifestPlaceholders = [
        appLabel: "G9Expert"
    ]
}

productFlavors {

    user {
        dimension "app"

        applicationId "com.g9expert.user"

        versionNameSuffix "-user"

        manifestPlaceholders = [
                appLabel: "G9Expert User"
        ]

        buildConfigField "String", "APP_TYPE", "\"user\""
        buildConfigField "String", "API_BASE_URL", "\"https://softmaxs.com/api\""
    }

    expert {
        dimension "app"

        applicationId "com.g9expert.expert"

        versionNameSuffix "-expert"

        manifestPlaceholders = [
                appLabel: "G9Expert Expert"
        ]

        buildConfigField "String", "APP_TYPE", "\"expert\""
        buildConfigField "String", "API_BASE_URL", "\"https://softmaxs.com/api\""
    }

}
    
    signingConfigs {
        release {
            storeFile file(MYAPP_UPLOAD_STORE_FILE)
            storePassword MYAPP_UPLOAD_STORE_PASSWORD
            keyAlias MYAPP_UPLOAD_KEY_ALIAS
            keyPassword MYAPP_UPLOAD_KEY_PASSWORD
        }
    }
    
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

configurations.all {
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')

    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.constraintlayout:constraintlayout:2.2.1"

    implementation("io.socket:socket.io-client:2.1.1") {
    exclude group: "org.json", module: "json"
}

    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    implementation 'com.google.firebase:firebase-messaging:25.0.1'

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}